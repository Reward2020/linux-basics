Host name-server
    HostName     # ip addres or domen to vm
    User         # user name wich will be connected
    Port         # port if not standard
    IdentityFile # path/to/your/private_key
    IdentitiesOnly yes

Host bastion
    HostName bastion.example.com
    User deploy
    IdentityFile ~/.ssh/bastion_key
    IdentitiesOnly yes

Host internal-*
    User internaluser
    ProxyJump bastion
    IdentityFile ~/.ssh/internal_key
    ServerAliveInterval 60
    ServerAliveCountMax 3
    IdentitiesOnly yes
